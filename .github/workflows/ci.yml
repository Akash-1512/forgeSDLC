name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: forgesdlc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint and format check
        run: ruff check . && ruff format --check .

      - name: Security scan
        run: semgrep --config=p/python --config=p/security --error .
        continue-on-error: true

      - name: Run tests (excluding slow e2e)
        run: pytest tests/ -m "not slow" --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:forgesdlc@localhost:5432/forgesdlc

      - name: Commercial readiness check
        run: python scripts/commercial_readiness_check.py
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:forgesdlc@localhost:5432/forgesdlc
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        # Hard failures exit 1 and block merge.
        # Advisories (Render, EU Act deadline) print but do not block.