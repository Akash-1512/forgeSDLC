name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: forgesdlc
          POSTGRES_DB: forgesdlc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (skip slow e2e)
        run: pytest tests/ -q -m "not slow"
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:forgesdlc@localhost:5432/forgesdlc

      - name: Commercial readiness check
        run: python scripts/commercial_readiness_check.py
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:forgesdlc@localhost:5432/forgesdlc
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

  publish-python:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          pip install build twine
          python -m build

      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: cd electron && npm ci && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-electron:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: '*.exe'
          - os: macos-latest
            platform: mac
            artifact: '*.dmg'
          - os: ubuntu-latest
            platform: linux
            artifact: '*.deb'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install electron dependencies
        run: cd electron && npm ci

      - name: Build Electron app
        run: cd electron && npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: electron/dist/${{ matrix.artifact }}
          if-no-files-found: warn

  github-release:
    needs: [publish-python, publish-npm, build-electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          merge-multiple: true
          path: dist/

      - name: List release artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: docs/RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-vscode:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish VS Code extension
        run: cd vscode_extension && vsce publish --pat ${{ secrets.VSCE_PAT }}
        # Publisher: Akash-1512
        # Extension ID: Akash-1512.forgesdlc
        # Requires VSCE_PAT secret: dev.azure.com → Personal Access Tokens
        #   → Marketplace (Publish) scope

