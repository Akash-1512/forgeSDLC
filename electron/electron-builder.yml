appId: ai.forgesdlc.desktop
productName: forgeSDLC
copyright: Copyright 2026 Akash Chaudhari

directories:
  output: dist/electron

files:
  - "**/*"
  - "!node_modules/**"
  - "!dist/**"
  - "!**/__pycache__"
  - "!**/*.pyc"
  - "!**/*.md"

win:
  target: nsis
  icon: resources/icon.ico
  artifactName: forgesdlc-setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target: dmg
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  artifactName: forgesdlc-${version}.dmg

linux:
  target: deb
  icon: resources/icon.png
  category: Development
  artifactName: forgesdlc-${version}.deb

publish:
  provider: github
  owner: Akash-1512
  repo: forgesdlc
